# Usar /tmp para todos los directorios que necesita Nginx
pid /tmp/nginx.pid;
error_log /tmp/nginx_error.log;

worker_processes 1;

events { worker_connections 1024; }

http {
    # Redirigir todos los archivos temporales a /tmp
    client_body_temp_path /tmp/nginx_client_body;
    proxy_temp_path       /tmp/nginx_proxy;
    fastcgi_temp_path     /tmp/nginx_fastcgi;
    uwsgi_temp_path       /tmp/nginx_uwsgi;
    scgi_temp_path        /tmp/nginx_scgi;
    access_log            /tmp/nginx_access.log;

    server {
        listen 7860;

        location / {
            proxy_pass http://127.0.0.1:18789;

            # Headers esenciales para WebSocket
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            # Headers estándar de proxy
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Timeouts generosos para respuestas LLM largas
            proxy_read_timeout    300s;
            proxy_send_timeout    300s;
            proxy_connect_timeout  75s;
        }
    }
}
